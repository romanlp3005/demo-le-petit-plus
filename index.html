<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Petit Plus - Système NFC</title>
    <style>
        :root {
            --green: #4CAF50;
            --red: #e63946;
            --blue: #0077b6;
            --bg: #f4f7f6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }

        /* Barre de couleur en haut qui change selon le statut */
        .status-bar {
            height: 10px;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: var(--green);
        }

        .logo {
            width: 100px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #eee;
            margin: 20px 0;
        }

        .status-badge {
            background-color: var(--green);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }

        .info-grid {
            text-align: left;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-item {
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #ddd;
            padding-bottom: 5px;
        }

        .info-label {
            font-weight: bold;
            color: #777;
            font-size: 0.9rem;
        }

        .info-value {
            font-weight: 600;
        }

        .footer-msg {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* Animation de scan */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .valid { animation: pulse 0.5s ease-in-out; }
    </style>
</head>
<body>

    <div class="card valid" id="main-card">
        <div class="status-bar" id="top-bar"></div>
        
        <img src="https://via.placeholder.com/100x100?text=LOGO" alt="Logo" class="logo">
        <h1>Le Petit Plus</h1>

        <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&q=80&w=400" alt="Photo" class="profile-pic">

        <div class="status-badge" id="badge">✅ ADHÉSION VALIDE</div>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Nom :</span>
                <span class="info-value" id="name">DUBOIS Thomas</span>
            </div>
            <div class="info-item">
                <span class="info-label">Statut :</span>
                <span class="info-value" id="type">Étudiant (L3)</span>
            </div>
            <div class="info-item">
                <span class="info-label">Dernier passage :</span>
                <span class="info-value" id="last-date">12/03/2024</span>
            </div>
            <div class="info-item">
                <span class="info-label">Cotisation :</span>
                <span class="info-value" id="expiry">Payée (Sept 2024)</span>
            </div>
        </div>

        <p class="footer-msg">Système de gestion NFC - Le Petit Plus v1.0</p>
    </div>

    <script>
        // Petite astuce pour ta démo : 
        // Si tu ajoutes ?role=benevole à la fin de l'URL, la page change !
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');

        if(role === 'benevole') {
            document.getElementById('top-bar').style.backgroundColor = '#0077b6';
            document.getElementById('badge').style.backgroundColor = '#0077b6';
            document.getElementById('badge').innerText = '👋 POINTAGE BÉNÉVOLE';
            document.getElementById('name').innerText = 'MARTIN Sarah';
            document.getElementById('type').innerText = 'Bénévole Actif';
            document.getElementById('last-date').innerText = 'Aujourd\'hui (08:30)';
            document.getElementById('expiry').innerText = 'Total : 42h ce mois';
        }
    </script>
</body>
</html>
