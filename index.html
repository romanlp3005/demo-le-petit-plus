<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard NFC - Le Petit Plus</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; min-width: 300px; }
        .status { padding: 5px 15px; border-radius: 20px; font-weight: bold; color: white; }
        .student { background: #28a745; }
        .staff { background: #007bff; }
        #profile { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 Le Petit Plus</h1>
    <p id="waiting">📡 Prêt ! Scannez une carte avec le téléphone...</p>

    <div id="profile">
        <div id="badge" class="status"></div>
        <h2 id="name"></h2>
        <p>UID : <span id="uid-val"></span></p>
        <p><strong>Solde :</strong> <span id="solde"></span></p>
    </div>
</div>

<script>
    // Ta base de données locale
    const membres = {
        "04:A1:B2:C3:D4": { nom: "Roman L.", type: "Adhérent", classe: "student", solde: "12,50 €" },
        "E0:04:01:09:09:15:C0:06": { nom: "Staff Petit Plus", type: "Staff", classe: "staff", solde: "Illimité" }
    };

    // ON ÉCOUTE LA BOÎTE AUX LETTRES (ntfy.sh)
    // "le_petit_plus_demo" est le nom de ta boîte (tu peux le changer par un truc secret)
    const topic = "le_petit_plus_demo_castres"; 
    
    function ecouterScan() {
        fetch(`https://ntfy.sh/${topic}/json`)
            .then(response => {
                const reader = response.body.getReader();
                return new ReadableStream({
                    start(controller) {
                        function push() {
                            reader.read().then(({ done, value }) => {
                                if (done) return;
                                const chunk = new TextDecoder().decode(value);
                                const lines = chunk.split('\n');
                                lines.forEach(line => {
                                    if (line) {
                                        const data = JSON.parse(line);
                                        if (data.event === "message") {
                                            afficherProfil(data.message);
                                        }
                                    }
                                });
                                push();
                            });
                        }
                        push();
                    }
                });
            });
    }

    function afficherProfil(messageRecu) {
    // Cette ligne nettoie le message si le téléphone envoie du JSON
    // Elle enlève les { } " : et garde juste l'ID
    let uid = messageRecu.replace(/[{}":]/g, "").trim();
    
    // Si après nettoyage il reste du vide à droite (cas du {"ID":""})
    if (uid.includes("")) { uid = uid.split('')[0]; } // Optionnel selon le tel

    // Version ultra-robuste pour ton cas précis :
    if (messageRecu.includes("04:A1:B2:C3:D4")) { uid = "04:A1:B2:C3:D4"; }
    if (messageRecu.includes("E0:04:01:09:09:15:C0:06")) { uid = "E0:04:01:09:09:15:C0:06"; }

    const user = membres[uid];
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('profile').style.display = 'block';
    
    if (user) {
        document.getElementById('name').innerText = user.nom;
        document.getElementById('uid-val').innerText = uid;
        document.getElementById('solde').innerText = user.solde;
        document.getElementById('badge').innerText = user.type;
        document.getElementById('badge').className = "status " + user.classe;
        // Petit son de succès
        new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play();
    } else {
        document.getElementById('name').innerText = "Carte Inconnue";
        document.getElementById('uid-val').innerText = uid;
        document.getElementById('badge').innerText = "ERREUR";
    }
}

    ecouterScan(); // Lancer l'écoute
</script>
</body>
</html>
