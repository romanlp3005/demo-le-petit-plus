<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard NFC - Le Petit Plus</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; border-top: 5px solid #28a745; }
        img { max-width: 120px; margin-bottom: 1rem; }
        .profile { display: none; animation: fadeIn 0.5s; }
        .badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; }
        .student { background: #e2f3e5; color: #28a745; }
        .staff { background: #e7f3ff; color: #007bff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <img src="logo_petit_plus.jpeg" alt="Logo Le Petit Plus">
    <h1>Système NFC</h1>
    
    <div id="waiting">
        <p style="color: #666;">📡 En attente d'un scan sur le téléphone...</p>
    </div>

    <div id="profile" class="profile">
        <div id="badge-type" class="badge">--</div>
        <h2 id="user-name" style="margin: 0;">--</h2>
        <p id="user-uid" style="color: #888; font-size: 0.8rem;">UID: --</p>
        <hr>
        <p><strong>Solde/Info :</strong> <span id="user-info">--</span></p>
        <button onclick="location.reload()" style="margin-top:15px; padding:8px 15px; cursor:pointer;">Réinitialiser</button>
    </div>
</div>

<script>
    // 1. CONFIGURATION (Remplace avec tes clés Supabase si tu en crée un, sinon utilise ces placeholders pour le test)
    const SUPABASE_URL = 'https://VOTRE_PROJET.supabase.co';
    const SUPABASE_KEY = 'VOTRE_CLE_ANON';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. TA BASE DE DONNÉES LOCALE
    const membres = {
        "04:A1:B2:C3:D4": { nom: "Roman L. (Étudiant)", type: "Adhérent", classe: "student", info: "12,50 €" },
        "E0:04:01:09:09:15:C0:06": { nom: "Staff Petit Plus", type: "Membre Staff", classe: "staff", info: "Accès Admin" }
    };

    // 3. ÉCOUTE DU SCAN (TEMPS RÉEL)
    // Dès qu'une nouvelle ligne est ajoutée dans la table "scans" par ton téléphone...
    supabase
        .channel('public:scans')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'scans' }, payload => {
            const uid = payload.new.uid;
            afficherProfil(uid);
        })
        .subscribe();

    function afficherProfil(uid) {
        const user = membres[uid];
        document.getElementById('waiting').style.display = 'none';
        const p = document.getElementById('profile');
        p.style.display = 'block';
        
        if (user) {
            document.getElementById('user-name').innerText = user.nom;
            document.getElementById('user-uid').innerText = "UID: " + uid;
            document.getElementById('user-info').innerText = user.info;
            document.getElementById('badge-type').innerText = user.type;
            document.getElementById('badge-type').className = "badge " + user.classe;
            // Optionnel : Petit son de succès
            new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3').play();
        } else {
            document.getElementById('user-name').innerText = "Carte Inconnue";
            document.getElementById('user-uid').innerText = uid;
            document.getElementById('badge-type').innerText = "ERREUR";
        }
    }
</script>
</body>
</html>
