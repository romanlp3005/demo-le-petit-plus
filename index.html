<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Petit Plus - Dashboard NFC</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        :root {
            --green: #2ecc71;
            --dark-green: #27ae60;
            --red: #e74c3c;
            --bg: #f0f2f5;
            --text: #2c3e50;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
        }

        /* ANIMATION DE SCAN DE DÉPART */
        #scan-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .radar {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 4px solid var(--green);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
        }
        .radar::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 50%; height: 50%;
            background: linear-gradient(45deg, rgba(46, 204, 113, 0.8), transparent);
            transform-origin: top left;
            animation: radarSpin 1s linear infinite;
        }
        @keyframes radarSpin { 100% { transform: rotate(360deg); } }

        /* APPLICATION PRINCIPALE */
        .app-container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            width: 100%; max-width: 420px;
            height: 90vh; max-height: 800px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            overflow-y: auto;
            padding: 20px;
            display: none; /* Caché au début */
            flex-direction: column;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { height: 40px; border-radius: 8px; }
        .header-title { font-weight: 800; color: var(--dark-green); font-size: 1.2rem; }
        .nfc-icon { font-size: 1.5rem; color: #7f8c8d; }

        .profile-section { text-align: center; }
        .profile-img {
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover;
            border: 4px solid var(--green);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
            margin-bottom: 15px;
        }
        .name { font-size: 1.8rem; margin: 0; font-weight: 700; }
        .uid-tag { background: #eee; padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; color: #777; display: inline-block; margin-top: 5px; }

        .status-badge {
            background: var(--green); color: white;
            padding: 10px 20px; border-radius: 30px;
            font-size: 1.1rem; font-weight: bold;
            display: inline-flex; align-items: center; gap: 10px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
            width: 100%; justify-content: center;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box {
            background: white; padding: 15px; border-radius: 15px; text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .stat-box i { font-size: 1.5rem; color: var(--green); margin-bottom: 5px; }
        .stat-value { font-size: 1.2rem; font-weight: bold; }
        .stat-label { font-size: 0.8rem; color: #777; }

        .action-buttons { display: flex; gap: 10px; margin-top: auto; }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.95); }
        .btn-edit { background: #3498db; color: white; }
        .btn-history { background: #2c3e50; color: white; }

        .modal {
            position: absolute; top: 100%; left: 0; width: 100%; height: 100%;
            background: var(--card-bg); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 20px;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; z-index: 10;
        }
        .modal.active { top: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { background: none; border: none; font-size: 1.5rem; color: #333; cursor: pointer; }

        .timeline { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
        .timeline-item { position: relative; padding-left: 30px; margin-bottom: 20px; border-left: 2px solid #ddd; }
        .time-date { font-weight: bold; font-size: 0.9rem; }
        .time-action { color: #555; font-size: 0.9rem; }

        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: bold; color: #555; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-save { background: var(--green); color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }

        #conn-indicator { position: fixed; bottom: 10px; right: 10px; font-size: 0.7rem; color: orange; z-index: 10000; }
    </style>
</head>
<body>

    <div id="conn-indicator">Connexion...</div>

    <div id="scan-screen">
        <div class="radar"></div>
        <h2 style="color: var(--green); margin-top: 20px;">En attente du scan...</h2>
        <p style="color: #777;">Approchez une carte NFC</p>
    </div>

    <div class="app-container" id="app">
        <div class="header">
            <img src="logo_petit_plus.jpeg" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/40x40/2ecc71/ffffff?text=ES'">
            <span class="header-title">ÉPICERIE SOLIDAIRE</span>
            <i class="fa-solid fa-wifi nfc-icon"></i>
        </div>

        <div class="profile-section">
            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&q=80&w=400" class="profile-img" alt="Étudiant">
            <h2 class="name" id="display-name">Thomas Dubois</h2>
            <div class="uid-tag"><i class="fa-solid fa-microchip"></i> UID: 04:A1:B2:C3:D4</div>
            <div class="status-badge" id="main-status">
                <i class="fa-solid fa-circle-check"></i> ADHÉSION À JOUR
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <i class="fa-solid fa-basket-shopping"></i>
                <div class="stat-value">24</div>
                <div class="stat-label">Passages</div>
            </div>
            <div class="stat-box">
                <i class="fa-solid fa-calendar-check"></i>
                <div class="stat-value" id="display-expiry">Sept 2026</div>
                <div class="stat-label">Fin validité</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-edit" onclick="openModal('edit-modal')">Modifier</button>
            <button class="btn btn-history" onclick="openModal('history-modal')">Historique</button>
        </div>

        <div class="modal" id="history-modal">
            <div class="modal-header">
                <h3>Historique</h3>
                <button class="close-btn" onclick="closeModal('history-modal')">✕</button>
            </div>
            <ul class="timeline">
                <li class="timeline-item"><div class="time-date">Aujourd'hui</div><div class="time-action">Entrée validée</div></li>
            </ul>
        </div>

        <div class="modal" id="edit-modal">
            <div class="modal-header">
                <h3>Modifier</h3>
                <button class="close-btn" onclick="closeModal('edit-modal')">✕</button>
            </div>
            <div class="form-group">
                <label>Nom</label><input type="text" id="input-name" value="Thomas Dubois">
            </div>
            <button class="btn-save" onclick="saveProfile()">Enregistrer</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION DU PONT (MQTT) ---
        const topic = "lepetitplus/demo/roman" + Math.floor(Math.random() * 1000); // Unique pour ta session
        console.log("Ton topic est : " + topic); 
        
        const client = new Paho.MQTT.Client("broker.hivemq.com", 8884, "client_" + Math.random());

        client.onMessageArrived = (message) => {
            if(message.payloadString === "UNLOCK") {
                unlockApp();
            }
        };

        client.connect({ 
            useSSL: true, 
            onSuccess: () => {
                document.getElementById('conn-indicator').innerText = "Pont Connecté ●";
                document.getElementById('conn-indicator').style.color = "green";
                client.subscribe(topic);
                
                // Vérifie si c'est le téléphone qui scanne (?scan=1)
                const params = new URLSearchParams(window.location.search);
                if(params.get('scan')) {
                    const msg = new Paho.MQTT.Message("UNLOCK");
                    msg.destinationName = topic;
                    client.send(msg);
                    document.body.innerHTML = "<h1 style='color:white; text-align:center; padding-top:100px;'>✅ SCAN RÉUSSI !</h1>";
                }
            }
        });

        function unlockApp() {
            document.getElementById('scan-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('scan-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            }, 500);
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        function saveProfile() {
            document.getElementById('display-name').innerText = document.getElementById('input-name').value;
            closeModal('edit-modal');
        }
    </script>
</body>
</html>
