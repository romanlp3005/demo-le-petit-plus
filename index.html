<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Démo NFC - Le Petit Plus</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding-top: 50px; }
        .card { background: white; width: 300px; margin: 0 auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .photo { width: 100px; height: 100px; border-radius: 50%; background: #eee; margin-bottom: 15px; }
        .status { padding: 10px; border-radius: 10px; font-weight: bold; margin-top: 15px; }
        .valid { background: #e8f8f5; color: #27ae60; }
        #conn-status { font-size: 0.8rem; margin-bottom: 20px; color: orange; }
    </style>
</head>
<body>

    <div id="conn-status">Connexion au pont...</div>

    <div id="view-waiting">
        <h1>Système de Pointage</h1>
        <p>En attente d'un scan NFC...</p>
        <div style="font-size: 5rem; margin-top: 20px;">📱</div>
    </div>

    <div id="view-result" style="display:none;">
        <div class="card">
            <img src="https://via.placeholder.com/100" class="photo">
            <h2 id="p-name">Thomas Dubois</h2>
            <p>Étudiant Adhérent</p>
            <div class="status valid">✅ ADHÉSION VALIDE</div>
        </div>
        <button onclick="window.location.reload()" style="margin-top:20px; padding:10px; cursor:pointer;">Réinitialiser</button>
    </div>

    <script>
        // --- CONFIGURATION DU PONT ---
        // Change "roman123" par n'importe quoi d'autre pour que ton pont soit unique
        const topic = "lepetitplus/demo/roman123"; 
        const client = new Paho.MQTT.Client("broker.hivemq.com", 8884, "client_" + Math.random());

        client.onMessageArrived = (message) => {
            // Quand l'ordinateur reçoit le signal "scan"
            document.getElementById('view-waiting').style.display = 'none';
            document.getElementById('view-result').style.display = 'block';
        };

        client.connect({ 
            useSSL: true, 
            onSuccess: () => {
                document.getElementById('conn-status').innerText = "Pont Connecté ●";
                document.getElementById('conn-status').style.color = "green";
                client.subscribe(topic);
                
                // SI C'EST LE TEL QUI OUVRE LE LIEN AVEC ?scan=1
                const params = new URLSearchParams(window.location.search);
                if(params.get('scan')) {
                    const message = new Paho.MQTT.Message("scan");
                    message.destinationName = topic;
                    client.send(message);
                    // Message sur le téléphone
                    document.body.innerHTML = "<h1 style='color:green; padding:50px;'>✅ SCAN ENVOYÉ !</h1><p>Regardez l'ordinateur.</p>";
                }
            }
        });
    </script>
</body>
</html>
